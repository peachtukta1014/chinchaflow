# Cloud Functions (LINE webhooks) — เฉพาะเมื่อ webhook-core เปลี่ยน
name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'apps/webhook-core/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy_functions:
    name: Deploy LINE Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install
        working-directory: apps/webhook-core

      - name: Resolve LIFF ID (secret or auto-provision)
        id: liff
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_LIFF_ID: ${{ secrets.LINE_LIFF_ID }}
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
        run: |
          set -euo pipefail
          ID="${LINE_LIFF_ID:-${VITE_LIFF_ID:-}}"
          if [ -z "$ID" ]; then
            ID=$(node apps/webhook-core/scripts/provision-shrimp-liff.mjs --ensure | tail -1)
          fi
          if [ -z "$ID" ]; then
            echo "LIFF ID missing — set LINE_LIFF_ID or ensure LINE_CHANNEL_ACCESS_TOKEN can create LIFF"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Resolved LIFF ID (${#ID} chars)"

      - name: Write env vars for functions
        run: |
          {
            echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}"
            echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}"
            echo "LINE_TEA_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_TEA_CHANNEL_ACCESS_TOKEN }}"
            echo "LINE_TEA_CHANNEL_SECRET=${{ secrets.LINE_TEA_CHANNEL_SECRET }}"
            echo "LINE_LIFF_ID=${{ steps.liff.outputs.id }}"
          } > apps/webhook-core/.env

      - name: Deploy all LINE functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only functions --project chincha-eeed6 --non-interactive --force

      - name: Wait and verify webhooks (must return 200 ok)
        continue-on-error: true
        run: |
          BASE="https://asia-southeast1-chincha-eeed6.cloudfunctions.net"
          for name in lineWebhookTea lineWebhook; do
            ok=0
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -o /tmp/h -w "%{http_code}" "$BASE/$name" || echo "000")
              echo "try $i $name -> HTTP $code"
              if [ "$code" = "200" ]; then ok=1; break; fi
              sleep 15
            done
            if [ "$ok" != "1" ]; then
              echo "FAIL: $name not healthy"
              exit 1
            fi
          done
          echo "All webhooks healthy"
