# Cloud Functions (LINE webhooks) — เฉพาะเมื่อ webhook-core เปลี่ยน
name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'apps/webhook-core/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy_functions:
    name: Deploy LINE Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install
        working-directory: apps/webhook-core

      - name: Resolve LIFF ID (secret or auto-provision)
        id: liff
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_LIFF_ID: ${{ secrets.LINE_LIFF_ID }}
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
        run: |
          set -euo pipefail
          ID="${LINE_LIFF_ID:-${VITE_LIFF_ID:-}}"
          if [ -z "$ID" ] && [ -f apps/webhook-core/shrimp-liff-id.json ]; then
            ID=$(node -p "require('./apps/webhook-core/shrimp-liff-id.json').liffId")
          fi
          if [ -z "$ID" ]; then
            ID=$(node apps/webhook-core/scripts/provision-shrimp-liff.mjs --ensure 2>/dev/null | tail -1 || true)
          fi
          if [ -z "$ID" ]; then
            echo "::warning::LIFF ID not set — พิมพ์ ฟอร์มใน OA ยังไม่เปิดจนกว่าจะตั้ง shrimp-liff-id.json หรือ Secrets"
          else
            echo "Resolved LIFF ID (${#ID} chars)"
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Resolve LIFF slip ID (secret or auto-provision)
        id: liff_slip
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_LIFF_SLIP_ID: ${{ secrets.LINE_LIFF_SLIP_ID }}
          VITE_LIFF_SLIP_ID: ${{ secrets.VITE_LIFF_SLIP_ID }}
        run: |
          set -euo pipefail
          ID="${LINE_LIFF_SLIP_ID:-${VITE_LIFF_SLIP_ID:-}}"
          if [ -z "$ID" ] && [ -f apps/webhook-core/shrimp-liff-slip-id.json ]; then
            ID=$(node -p "require('./apps/webhook-core/shrimp-liff-slip-id.json').liffId")
          fi
          if [ -z "$ID" ]; then
            set +e
            PROVISION_OUT=$(node apps/webhook-core/scripts/provision-shrimp-liff.mjs --ensure --slip 2>&1)
            PROVISION_EXIT=$?
            set -e
            echo "$PROVISION_OUT"
            ID=$(echo "$PROVISION_OUT" | tail -1)
            if [ "$PROVISION_EXIT" -ne 0 ] || [ -z "$ID" ]; then
              echo "::warning::LINE_LIFF_SLIP_ID missing — ลิงก์ฝากสลิปในบิลค้างยังไม่เปิด"
              ID=""
            elif [ -f apps/webhook-core/shrimp-liff-slip-id.json ]; then
              cat apps/webhook-core/shrimp-liff-slip-id.json
            fi
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Write env vars for functions
        env:
          _OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          _GH_PAT_DISPATCH: ${{ secrets.GH_PAT_DISPATCH }}
          _GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # ใช้ env: + printf เพื่อ strip newline ที่อาจติดมาตอน paste secret
          strip() { printf '%s' "$1" | tr -d '\r\n'; }
          {
            echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}"
            echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}"
            echo "LINE_TEA_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_TEA_CHANNEL_ACCESS_TOKEN }}"
            echo "LINE_TEA_CHANNEL_SECRET=${{ secrets.LINE_TEA_CHANNEL_SECRET }}"
            echo "LINE_LIFF_ID=${{ steps.liff.outputs.id }}"
            echo "LINE_LIFF_SLIP_ID=${{ steps.liff_slip.outputs.id }}"
            echo "LINE_LOGIN_CHANNEL_ID=${{ secrets.LINE_LOGIN_CHANNEL_ID }}"
            printf 'OPENROUTER_API_KEY=%s\n' "$(strip "${_OPENROUTER_API_KEY}")"
            printf 'GH_PAT_DISPATCH=%s\n'    "$(strip "${_GH_PAT_DISPATCH}")"
            printf 'GH_PAT=%s\n'             "$(strip "${_GH_PAT}")"
          } > apps/webhook-core/.env

      - name: Deploy all LINE functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          deploy_all() {
            firebase deploy --only functions --project chincha-eeed6 --non-interactive --force
          }
          deploy_slip_only() {
            firebase deploy --only functions:shrimpLiffSlip --project chincha-eeed6 --non-interactive --force
          }
          if deploy_all; then
            exit 0
          fi
          echo "Full deploy failed — retry once after 30s (GCP parallel update flake)..."
          sleep 30
          if deploy_all; then
            exit 0
          fi
          echo "Full deploy still failing — retry shrimpLiffSlip only..."
          deploy_slip_only

      - name: Notify deploy status (functions)
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          STATUS="success"
          [ "$JOB_STATUS" != "success" ] && STATUS="failure"
          curl -sf -X POST \
            "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"app\":\"functions\",\"status\":\"$STATUS\",\"workflow\":\"deploy-functions\",\"runId\":\"$GITHUB_RUN_ID\",\"sha\":\"$GITHUB_SHA\"}" || true

      # =========================================================================
      # 🔥 สเตปใหม่: ซิงค์คู่มือและสมอง AI (เวอร์ชันอัปเกรดคำสั่งภาษาไทย ดัก Error จริง)
      # =========================================================================
      - name: Sync Agent Docs to Brain (ภาษาไทย)
        if: job.status == 'success'
        env:
          DEPLOY_NOTIFY_URL: "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp"
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "📢 [1/3] กำลังเตรียมอ่านไฟล์คู่มือภาษาไทยและข้อมูลระบบ..."
          
          PAYLOAD=$(jq -n \
            --arg sha "$GITHUB_SHA" \
            --arg jiiji    "$(cat JIIJI.md 2>/dev/null || true)" \
            --arg agents   "$(cat AGENTS.md 2>/dev/null || true)" \
            --arg metrics  "$(cat docs/CODE_METRICS.md 2>/dev/null || true)" \
            --arg style    "$(cat docs/PEACH_WORKING_STYLE_TH.md 2>/dev/null || true)" \
            --arg handbook "$(cat docs/AGENT_HANDBOOK_TH.md 2>/dev/null || true)" \
            '{action:"agent_docs", sha:$sha, files:{
              "JIIJI.md":$jiiji,
              "AGENTS.md":$agents,
              "docs/CODE_METRICS.md":$metrics,
              "docs/PEACH_WORKING_STYLE_TH.md":$style,
              "docs/AGENT_HANDBOOK_TH.md":$handbook
            }}')

          echo "🚀 [2/3] กำลังยิงส่งข้อมูลขึ้น Cloud Functions เพื่ออัปเดตความทรงจำ AI..."
          
          # ใช้ -i เพื่อดู Response Header และเอา -sf ออกเพื่อไม่ให้ซ่อน Error
          # ผลลัพธ์การตอบกลับจะถูกเซฟลงไฟล์ /tmp/docs_response
          HTTP_STATUS=$(curl -i -X POST "$DEPLOY_NOTIFY_URL" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -s -w "%{http_code}" -o /tmp/docs_response)

          echo "--------------------------------------------------"
          echo "📥 [3/3] รายละเอียดการตอบกลับจากเซิร์ฟเวอร์ (HTTP Status: $HTTP_STATUS):"
          echo "--------------------------------------------------"
          cat /tmp/docs_response
          echo -e "\n--------------------------------------------------"

          # ตรวจสอบสเตตัส ถ้าไม่ใช่ 200 ให้สั่งท่อพังทันที (Exit 1)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ [FAIL] ซิงค์ไฟล์คู่มือภาษาไทยเข้าสมอง AI ไม่สำเร็จ! กรุณาเช็กสิทธิ์คีย์หรือโค้ดหลังบ้าน"
            exit 1
          fi
          
          echo "✅ [SUCCESS] ซิงค์คู่มือและสไตล์การทำงานของพี่พีชขึ้นสมอง AI เรียบร้อยแล้ว!"

      - name: Wait and verify webhooks (must return 200 ok)
        continue-on-error: true
        run: |
          BASE="https://asia-southeast1-chincha-eeed6.cloudfunctions.net"
          for name in lineWebhookTea lineWebhook; do
            ok=0
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -o /tmp/h -w "%{http_code}" "$BASE/$name" || echo "000")
              echo "try $i $name -> HTTP $code"
              if [ "$code" = "200" ]; then ok=1; break; fi
              sleep 15
            done
            if [ "$ok" != "1" ]; then
              echo "FAIL: $name not healthy"
              exit 1
            fi
          done
          echo "All webhooks healthy"
