name: Code Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  code-metrics:
    name: Generate code metrics report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate code metrics
        run: npm run code:metrics

      - name: Write GitHub Step Summary
        if: success()
        run: cat reports/code-metrics.md >> $GITHUB_STEP_SUMMARY

      - name: Commit metrics to docs/
        if: success()
        run: |
          cp reports/code-metrics.md docs/CODE_METRICS.md
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/CODE_METRICS.md
          git diff --staged --quiet && echo "no changes" || git commit -m "chore: อัปเดต code metrics $(date +%Y-%m-%d) [skip ci]"
          git push origin HEAD:main

      - name: Upload code metrics report
        uses: actions/upload-artifact@v4
        with:
          name: code-metrics-report
          path: |
            reports/code-metrics.json
            reports/code-metrics.md
          if-no-files-found: error
