name: Deploy to Firebase

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 0a. Deploy Firestore rules & indexes for chincha database ────────────────
  deploy_firestore:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules & indexes (default database)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only firestore --project chincha-eeed6 --non-interactive

      - name: Deploy chincha database rules via Admin SDK
        run: |
          npm install --no-save firebase-admin
          node - << 'EOF'
          const admin = require('firebase-admin');
          const fs = require('fs');
          admin.initializeApp({
            credential: admin.credential.cert(JSON.parse(fs.readFileSync('/tmp/sa.json', 'utf8'))),
            projectId: 'chincha-eeed6',
          });
          const src = fs.readFileSync('firestore-chincha.rules', 'utf8');
          admin.securityRules()
            .releaseFirestoreRulesetFromSource(src, 'chincha')
            .then((r) => { console.log('chincha rules deployed:', r.name); })
            .catch((e) => { console.error('chincha rules error:', e.message); process.exit(1); });
          EOF

  # ── 0b. Deploy Cloud Functions (LINE webhook) ─────────────────────────────────
  deploy_functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install
        working-directory: apps/webhook-core

      - name: Write env vars for functions
        run: |
          {
            echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}"
            echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}"
            echo "LINE_TEA_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_TEA_CHANNEL_ACCESS_TOKEN }}"
            echo "LINE_TEA_CHANNEL_SECRET=${{ secrets.LINE_TEA_CHANNEL_SECRET }}"
          } > apps/webhook-core/.env

      - name: Deploy all LINE functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only functions --project chincha-eeed6 --non-interactive --force

      - name: Wait and verify webhooks (must return 200 ok)
        continue-on-error: true
        run: |
          BASE="https://asia-southeast1-chincha-eeed6.cloudfunctions.net"
          for name in lineWebhookTea lineWebhook; do
            ok=0
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -o /tmp/h -w "%{http_code}" "$BASE/$name" || echo "000")
              echo "try $i $name -> HTTP $code"
              if [ "$code" = "200" ]; then ok=1; break; fi
              sleep 15
            done
            if [ "$ok" != "1" ]; then
              echo "FAIL: $name not healthy"
              exit 1
            fi
          done
          echo "All webhooks healthy"

  # ── 1. Build & deploy Shrimp POS ─────────────────────────────────────────────
  deploy_shrimp:
    name: Deploy Shrimp POS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build seafood-pos
        run: npm run build --workspace=apps/seafood-pos
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:       ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID_SHRIMP }}

      - name: Deploy to Firebase Hosting (shrimp)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              chincha-eeed6
          target:                 shrimp
          channelId:              live

  # ── 2. Build & deploy Chincha Tea ────────────────────────────────────────────
  deploy_tea:
    name: Deploy Chincha Tea
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build chincha-tea
        run: npm run build --workspace=apps/chincha-tea
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:       ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID_TEA }}

      - name: Deploy to Firebase Hosting (tea)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              chincha-eeed6
          target:                 tea
          channelId:              live
        continue-on-error: true
