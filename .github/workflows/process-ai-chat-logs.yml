name: Process Historical AI Chat Logs

on:
  workflow_dispatch:
    inputs:
      ai_instruction:
        description: 'คำสั่งสำหรับ AI (เช่น สร้างไฟล์สรุปแชท, แก้ไขโค้ด ฯลฯ)'
        required: true
        default: 'สรุปประวัติแชททั้งหมดในโฟลเดอร์ logs'

permissions:
  contents: write

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install

      - name: Run AI Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # ดึงค่าจากช่อง Input ที่เราสร้างขึ้น
          AI_CODE_INSTRUCTION: ${{ github.event.inputs.ai_instruction }}
        run: node index.js
