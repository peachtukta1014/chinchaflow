name: Process Historical AI Chat Logs

on:
  workflow_dispatch:

# สำคัญมาก! อนุญาตให้ระบบเขียนไฟล์และ Push โค้ดได้
permissions:
  contents: write

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install

      - name: Run AI Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_CODE_INSTRUCTION: "จัดระเบียบ Partition ใน apps/webhook-core/"
        run: node index.js
