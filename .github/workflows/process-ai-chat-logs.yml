name: Process Historical AI Chat Logs

on:
  workflow_dispatch:

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run AI Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_CODE_INSTRUCTION: "จัดระเบียบ Partition ใน apps/webhook-core/"
        run: node index.js
