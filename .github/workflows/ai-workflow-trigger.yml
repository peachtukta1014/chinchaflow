name: AI Workflow Trigger (Pro Agent)
# รับ repository_dispatch จาก Flash CF → รัน Pro agentic loop → ส่งผลกลับ Cloud Function
# Pro secrets (OPENROUTER_API_KEY_PRO, GH_PAT) อยู่ที่นี่เท่านั้น — ไม่แตะ Firebase CF เลย

on:
  repository_dispatch:
    types: [ai-code-action]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-agent:
    name: Pro agentic loop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: apps/webhook-core

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      - name: ACK — แจ้ง Firestore ว่า Pro ได้รับงานแล้ว
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          REQUEST_ID: ${{ github.event.client_payload.requestId }}
          SCOPE: ${{ github.event.client_payload.scope }}
        run: node apps/webhook-core/scripts/ack-pro-agent.cjs || echo "ACK skipped (non-fatal)"

      - name: Run Pro agent task
        run: node scripts/run-github-agent.mjs
        working-directory: apps/webhook-core
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY_PRO }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          AGENT_TASK_PAYLOAD: ${{ toJSON(github.event.client_payload) }}

      - name: Cleanup on failure — แจ้ง frontend ว่า Pro หยุดกลางคัน
        if: failure()
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          REQUEST_ID: ${{ github.event.client_payload.requestId }}
          SCOPE: ${{ github.event.client_payload.scope }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node apps/webhook-core/scripts/fail-pro-agent.cjs || echo "fail-cleanup skipped (non-fatal)"

      - name: Sync project tree → Firestore
        if: always()
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: node apps/webhook-core/scripts/sync-project-tree.cjs || echo "sync-project-tree skipped (non-fatal)"
