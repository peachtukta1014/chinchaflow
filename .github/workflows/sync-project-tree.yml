# อัปเดต tree overview ใน docs/PROJECT_STRUCTURE.md อัตโนมัติทุก push main
name: Sync Project Tree

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    name: Auto-sync project tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Sync tree in PROJECT_STRUCTURE.md
        run: node scripts/sync-project-tree.mjs

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet docs/PROJECT_STRUCTURE.md; then
            echo "no changes"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/PROJECT_STRUCTURE.md
            git commit -m "docs: auto-sync project tree [skip ci]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync tree to Firestore
        if: steps.commit.outputs.committed == 'true'
        env:
          DEPLOY_NOTIFY_URL: ${{ secrets.DEPLOY_NOTIFY_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TREE=$(cat docs/PROJECT_STRUCTURE.md)
          curl -sf -X POST "$DEPLOY_NOTIFY_URL" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"project_tree\",\"tree\":$(echo "$TREE" | jq -Rs .),\"sha\":\"$GITHUB_SHA\"}" || echo "Firestore sync skipped (non-fatal)"
