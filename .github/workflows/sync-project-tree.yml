# อัปเดต tree overview ใน docs/PROJECT_STRUCTURE.md + sync docs ให้ Flash อ่าน (Firestore)
name: Sync Project Tree

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    name: Auto-sync project tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Sync tree in PROJECT_STRUCTURE.md
        run: node scripts/sync-project-tree.mjs

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet docs/PROJECT_STRUCTURE.md; then
            echo "no changes"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/PROJECT_STRUCTURE.md
            git commit -m "docs: auto-sync project tree [skip ci]"
            git pull --rebase origin main
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # sync projectTree + agentDocs → Firestore ผ่าน Service Account (เชื่อถือได้กว่า curl+GH_PAT)
      - name: Sync docs to Firestore
        if: always()
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          cd apps/webhook-core && npm install --prefer-offline --silent
          node scripts/sync-agent-docs.cjs
