# อัปเดต tree overview ใน docs/PROJECT_STRUCTURE.md อัตโนมัติทุก push main
name: Sync Project Tree

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    name: Auto-sync project tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Sync tree in PROJECT_STRUCTURE.md
        run: node scripts/sync-project-tree.mjs

      - name: Commit if changed
        run: |
          git diff --quiet docs/PROJECT_STRUCTURE.md && echo "no changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_STRUCTURE.md
          git commit -m "docs: auto-sync project tree [skip ci]"
          git push
