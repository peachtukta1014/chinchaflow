# อัปเดต tree overview ใน docs/PROJECT_STRUCTURE.md + sync docs ให้ Flash อ่าน (Firestore)
name: Sync Project Tree

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    name: Auto-sync project tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Sync tree in PROJECT_STRUCTURE.md
        run: node scripts/sync-project-tree.mjs

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet docs/PROJECT_STRUCTURE.md; then
            echo "no changes"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/PROJECT_STRUCTURE.md
            git commit -m "docs: auto-sync project tree [skip ci]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync tree to Firestore
        if: always()
        env:
          DEPLOY_NOTIFY_URL: "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp"
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TREE=$(cat docs/PROJECT_STRUCTURE.md)
          curl -sf -X POST "$DEPLOY_NOTIFY_URL" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"project_tree\",\"tree\":$(echo "$TREE" | jq -Rs .),\"sha\":\"$GITHUB_SHA\"}" || echo "Firestore sync skipped (non-fatal)"

      # sync docs (กฎ/persona/metrics) ให้ Flash อ่านจาก Firestore แทน GitHub — รันทุกครั้ง
      - name: Sync agent docs to Firestore
        if: always()
        env:
          DEPLOY_NOTIFY_URL: "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp"
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sha "$GITHUB_SHA" \
            --arg jiiji    "$(cat JIIJI.md 2>/dev/null || true)" \
            --arg agents   "$(cat AGENTS.md 2>/dev/null || true)" \
            --arg metrics  "$(cat docs/CODE_METRICS.md 2>/dev/null || true)" \
            --arg style    "$(cat docs/PEACH_WORKING_STYLE_TH.md 2>/dev/null || true)" \
            --arg handbook "$(cat docs/AGENT_HANDBOOK_TH.md 2>/dev/null || true)" \
            '{action:"agent_docs", sha:$sha, files:{
              "JIIJI.md":$jiiji,
              "AGENTS.md":$agents,
              "docs/CODE_METRICS.md":$metrics,
              "docs/PEACH_WORKING_STYLE_TH.md":$style,
              "docs/AGENT_HANDBOOK_TH.md":$handbook
            }}')
          curl -sf -X POST "$DEPLOY_NOTIFY_URL" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "agent_docs sync skipped (non-fatal)"
