# ล้างลิงก์ Vercel บน GitHub repo (homepage + deployment environments)
# โปรเจกต์ deploy จริงผ่าน Firebase Hosting เท่านั้น — ดู deploy-hosting.yml
#
# ต้องมี repo secret ADMIN_TOKEN = Fine-grained PAT ที่เลือก repo chinchaflow
# + Administration Read and write + Actions Read and write
name: Disconnect Vercel from GitHub

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Clear Vercel homepage and environments
    runs-on: ubuntu-latest
    steps:
      - name: Verify ADMIN_TOKEN can access this repository
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing repo secret ADMIN_TOKEN (GitHub → Settings → Secrets → Actions)"
            exit 1
          fi
          gh api "repos/${GITHUB_REPOSITORY}" --jq '{full_name, private, homepage}' \
            || {
              echo "::error::ADMIN_TOKEN cannot read peachtukta1014/chinchaflow (404)."
              echo "::error::สร้าง Fine-grained PAT ใหม่ → Repository access: Only chinchaflow → Administration + Actions: Read and write"
              exit 1
            }

      - name: Clear repository homepage (removes vercel.app link on repo header)
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" \
            -d '{"homepage":""}' \
            | jq '{name, homepage}'

      - name: Delete Vercel GitHub deployment environments
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set +e
          for env in Preview Production "Production – chincha-shrimp"; do
            encoded=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$env")
            echo "Deleting environment: $env"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/environments/${encoded}" && echo "  deleted" || echo "  skip (missing or already removed)"
          done

      - name: Reminder — disconnect Vercel app (manual)
        run: |
          echo "::notice::Hosting จริง: Firebase (chincha-tea.web.app, ko-seafood.top)"
          echo "::notice::ถ้ายังมีโปรเจกต์ใน Vercel: vercel.com → Project → Settings → Git → Disconnect"
