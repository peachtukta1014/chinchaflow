name: sync-ai-constants

on:
  push:
    branches: [main]
    paths:
      - 'apps/webhook-core/src/shared/agentTools.js'

concurrency:
  group: auto-commit-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Extract constants from agentTools.js
        id: extract
        run: |
          MAX=$(grep -oP '(?<=MAX_ITERATIONS = )\d+' apps/webhook-core/src/shared/agentTools.js | head -1)
          CHECKPOINT=$(grep -oP '(?<=CHECKPOINT_INTERVAL = )\d+' apps/webhook-core/src/shared/agentTools.js | head -1)
          echo "MAX=$MAX" >> $GITHUB_OUTPUT
          echo "CHECKPOINT=$CHECKPOINT" >> $GITHUB_OUTPUT
          echo "📌 MAX_ITERATIONS=$MAX CHECKPOINT_INTERVAL=$CHECKPOINT"

      - name: Patch docs (AI_AGENT_SYSTEM.md + PRO.md)
        run: |
          MAX="${{ steps.extract.outputs.MAX }}"
          CHECKPOINT="${{ steps.extract.outputs.CHECKPOINT }}"
          # match แบบ whitespace-tolerant (\1 เก็บ spacing เดิมของแต่ละไฟล์ไว้) — กันปัญหา
          # เดิมที่ sed ต้องเว้นวรรคตรงเป๊ะถึงจะ match ทำให้ PRO.md หลุด sync ไปทั้งที่ workflow รันผ่านตลอด
          # /flashAnalysisLoop|finalize_task_brief/! → ข้ามบรรทัดที่พูดถึง Flash's MAX_ITERATIONS=6 (คนละ constant
          # คนละไฟล์กับ agentTools.js ของ Pro) ไม่งั้น sed จะไปทับเลข 6 ของ Flash ด้วยความผิดพลาด
          for f in docs/AI_AGENT_SYSTEM.md PRO.md .skill/scope-root.md .skill/scope-webhook.md; do
            [ -f "$f" ] || continue
            sed -i -E "/flashAnalysisLoop|finalize_task_brief/! s/(MAX_ITERATIONS[[:space:]]*=[[:space:]]*)[0-9]+/\1$MAX/g" "$f"
            sed -i -E "/flashAnalysisLoop|finalize_task_brief/! s/(CHECKPOINT_INTERVAL[[:space:]]*=[[:space:]]*)[0-9]+/\1$CHECKPOINT/g" "$f"
            sed -i -E "/flashAnalysisLoop|finalize_task_brief/! s/(CHECKPOINT[[:space:]]*=[[:space:]]*)[0-9]+/\1$CHECKPOINT/g" "$f"
          done
          echo "✅ patch เสร็จ (MAX_ITERATIONS=$MAX, CHECKPOINT_INTERVAL=$CHECKPOINT)"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/AI_AGENT_SYSTEM.md PRO.md .skill/scope-root.md .skill/scope-webhook.md
          if git diff --cached --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง — ข้าม"
          else
            git commit -m "chore: auto-sync AI constants from agentTools.js [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ push สำเร็จ"
          fi
