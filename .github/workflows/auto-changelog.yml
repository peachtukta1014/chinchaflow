name: auto-changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: auto-commit-main
  cancel-in-progress: false

jobs:
  append:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Build changelog entry
        id: entry
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DATE: ${{ github.event.pull_request.merged_at }}
        run: |
          DATE=$(echo "$PR_DATE" | cut -c1-10)
          # เขียน entry ลงไฟล์ชั่วคราว
          {
            echo "## ${DATE} — ${PR_TITLE} (PR #${PR_NUMBER})"
            echo ""
            # เอา body แค่ 2000 chars แรกป้องกัน changelog พอง
            echo "$PR_BODY" | head -c 2000
            echo ""
            echo ""
          } > /tmp/new_entry.md
          echo "✅ entry พร้อมแล้ว"

      - name: Prepend to AGENT_CHANGELOG_TH.md
        run: |
          cat /tmp/new_entry.md docs/AGENT_CHANGELOG_TH.md > /tmp/merged_changelog.md
          mv /tmp/merged_changelog.md docs/AGENT_CHANGELOG_TH.md
          echo "✅ prepend สำเร็จ"

      - name: Detect touched apps + prepend apps/<app>/CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # ดึงรายชื่อไฟล์ที่ PR นี้แก้ผ่าน GitHub API (ไม่พึ่ง git diff เพราะ merge strategy
          # ต่างกันได้ — merge commit/squash/rebase ทำให้ HEAD~1 ไม่แน่นอน)
          FILES=$(curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/files?per_page=100" | \
            grep -o '"filename": *"[^"]*"' | sed -E 's/"filename": *"([^"]*)"/\1/')

          if [ -z "$FILES" ]; then
            echo "⚠️ ดึงรายชื่อไฟล์ไม่ได้ (API error หรือไม่มีไฟล์) — ข้าม per-app changelog รอบนี้"
          else
            for app_changelog in apps/*/CHANGELOG.md; do
              [ -f "$app_changelog" ] || continue
              app_dir=$(dirname "$app_changelog")
              if echo "$FILES" | grep -q "^${app_dir}/"; then
                cat /tmp/new_entry.md "$app_changelog" > /tmp/merged_app_changelog.md
                mv /tmp/merged_app_changelog.md "$app_changelog"
                echo "✅ prepend $app_changelog สำเร็จ (PR แตะไฟล์ใน ${app_dir}/)"
              fi
            done
          fi

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/AGENT_CHANGELOG_TH.md apps/*/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง — ข้าม"
          else
            git commit -m "chore: auto-changelog PR #${{ github.event.pull_request.number }} [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ push changelog สำเร็จ"
          fi
