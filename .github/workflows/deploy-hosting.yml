# Firebase Hosting — แยก deploy กุ้ง / ชา ตาม path ที่เปลี่ยน
name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'apps/seafood-pos/**'
      - 'apps/chincha-tea/**'
      - 'apps/ai-chat/**'
      - 'package.json'
      - 'package-lock.json'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-hosting.yml'
  workflow_dispatch:
    inputs:
      deploy_shrimp:
        description: 'Deploy Shrimp POS hosting'
        type: boolean
        default: true
      deploy_tea:
        description: 'Deploy Chincha Tea hosting'
        type: boolean
        default: true
      deploy_ai_chat:
        description: 'Deploy AI Chat hosting'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      shrimp: ${{ steps.filter.outputs.shrimp }}
      tea: ${{ steps.filter.outputs.tea }}
      ai_chat: ${{ steps.filter.outputs.ai_chat }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shrimp:
              - 'apps/seafood-pos/**'
            tea:
              - 'apps/chincha-tea/**'
            ai_chat:
              - 'apps/ai-chat/**'
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'firebase.json'
              - '.firebaserc'

  deploy_shrimp:
    name: Deploy Shrimp POS
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' && inputs.deploy_shrimp ||
      github.event_name == 'push' && (needs.changes.outputs.shrimp == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Resolve LIFF ID (secret or auto-provision)
        id: liff
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_LIFF_ID: ${{ secrets.LINE_LIFF_ID }}
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
        run: |
          set -euo pipefail
          ID="${LINE_LIFF_ID:-${VITE_LIFF_ID:-}}"
          if [ -z "$ID" ] && [ -f apps/webhook-core/shrimp-liff-id.json ]; then
            ID=$(node -p "require('./apps/webhook-core/shrimp-liff-id.json').liffId")
          fi
          if [ -z "$ID" ]; then
            ID=$(node apps/webhook-core/scripts/provision-shrimp-liff.mjs --ensure 2>/dev/null | tail -1 || true)
          fi
          if [ -z "$ID" ]; then
            echo "::warning::VITE_LIFF_ID missing — build จะไม่มีฟอร์ม LIFF จนกว่าจะตั้งค่า"
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Resolve LIFF slip ID (secret or auto-provision)
        id: liff_slip
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_LIFF_SLIP_ID: ${{ secrets.LINE_LIFF_SLIP_ID }}
          VITE_LIFF_SLIP_ID: ${{ secrets.VITE_LIFF_SLIP_ID }}
        run: |
          set -euo pipefail
          ID="${LINE_LIFF_SLIP_ID:-${VITE_LIFF_SLIP_ID:-}}"
          if [ -z "$ID" ] && [ -f apps/webhook-core/shrimp-liff-slip-id.json ]; then
            ID=$(node -p "require('./apps/webhook-core/shrimp-liff-slip-id.json').liffId")
          fi
          if [ -z "$ID" ]; then
            set +e
            PROVISION_OUT=$(node apps/webhook-core/scripts/provision-shrimp-liff.mjs --ensure --slip 2>&1)
            PROVISION_EXIT=$?
            set -e
            echo "$PROVISION_OUT"
            ID=$(echo "$PROVISION_OUT" | tail -1)
            if [ "$PROVISION_EXIT" -ne 0 ] || [ -z "$ID" ]; then
              echo "::warning::VITE_LIFF_SLIP_ID missing — LIFF ฝากสลิปจะยังไม่เปิดจนกว่าจะตั้งค่า"
              ID=""
            elif [ -f apps/webhook-core/shrimp-liff-slip-id.json ]; then
              echo "shrimp-liff-slip-id.json written in CI (commit to repo if ID is new)"
              cat apps/webhook-core/shrimp-liff-slip-id.json
            fi
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Build seafood-pos
        run: npm run build --workspace=apps/seafood-pos
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:        ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID_SHRIMP }}
          VITE_LIFF_ID:                      ${{ steps.liff.outputs.id || secrets.VITE_LIFF_ID }}
          VITE_LIFF_SLIP_ID:                 ${{ steps.liff_slip.outputs.id || secrets.VITE_LIFF_SLIP_ID }}

      - name: Deploy to Firebase Hosting (shrimp)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              chincha-eeed6
          target:                 shrimp
          channelId:              live

      - name: Notify deploy status (shrimp)
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          STATUS="success"
          [ "$JOB_STATUS" != "success" ] && STATUS="failure"
          curl -sf -X POST \
            "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"app\":\"shrimp\",\"status\":\"$STATUS\",\"workflow\":\"deploy-hosting\",\"runId\":\"$GITHUB_RUN_ID\",\"sha\":\"$GITHUB_SHA\"}" || true

  deploy_tea:
    name: Deploy Chincha Tea
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' && inputs.deploy_tea ||
      github.event_name == 'push' && (needs.changes.outputs.tea == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build chincha-tea
        run: npm run build --workspace=apps/chincha-tea
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:        ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID_TEA }}

      - name: Deploy to Firebase Hosting (tea)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              chincha-eeed6
          target:                 tea
          channelId:              live
        continue-on-error: true

      - name: Notify deploy status (tea)
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          STATUS="success"
          [ "$JOB_STATUS" != "success" ] && STATUS="failure"
          curl -sf -X POST \
            "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"app\":\"tea\",\"status\":\"$STATUS\",\"workflow\":\"deploy-hosting\",\"runId\":\"$GITHUB_RUN_ID\",\"sha\":\"$GITHUB_SHA\"}" || true

  deploy_ai_chat:
    name: Deploy AI Chat
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' && inputs.deploy_ai_chat ||
      github.event_name == 'push' && (needs.changes.outputs.ai_chat == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Bump version (ai-DDMMYY.N)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BE_YY=$(( ( $(date -u +%Y) + 543 ) % 100 ))
          DDMMYY="$(date -u +%d%m)$(printf '%02d' $BE_YY)"
          TODAY=$(date -u +%Y-%m-%d)
          PATCH=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-hosting.yml/runs?per_page=100" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$TODAY\"))] | length" 2>/dev/null || echo "1")
          [ -z "$PATCH" ] || [ "$PATCH" = "0" ] && PATCH=1
          VERSION="ai-${DDMMYY}.${PATCH}"
          printf '// auto-generated by deploy-hosting.yml — ห้ามแก้มือ\nexport const APP_VERSION = '"'"'%s'"'"';\n' "$VERSION" \
            > apps/ai-chat/src/version.js
          echo "::notice::AI Chat version → $VERSION"

      - name: Build ai-chat
        run: npm run build --workspace=apps/ai-chat
        env:
          VITE_AI_CHAT_FUNCTION_URL: https://asia-southeast1-chincha-eeed6.cloudfunctions.net/aiChatAgentHttp

      - name: Deploy to Firebase Hosting (ai-chat)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              chincha-eeed6
          target:                 ai-chat
          channelId:              live

      - name: Notify deploy status (ai-chat)
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          STATUS="success"
          [ "$JOB_STATUS" != "success" ] && STATUS="failure"
          curl -sf -X POST \
            "https://asia-southeast1-chincha-eeed6.cloudfunctions.net/deployNotifyHttp" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"app\":\"ai-chat\",\"status\":\"$STATUS\",\"workflow\":\"deploy-hosting\",\"runId\":\"$GITHUB_RUN_ID\",\"sha\":\"$GITHUB_SHA\"}" || true
