# Firestore (default + chincha), indexes, Storage rules — เฉพาะเมื่อไฟล์ rules/indexes เปลี่ยน
name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firestore-chincha.rules'
      - 'firestore-chincha.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-rules.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy_firestore:
    name: Deploy Firestore & Storage Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules, indexes & Storage rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only firestore,storage --project chincha-eeed6 --non-interactive

      - name: Deploy chincha database rules via Admin SDK
        run: |
          npm install --no-save firebase-admin
          node - << 'EOF'
          const admin = require('firebase-admin');
          const fs = require('fs');
          admin.initializeApp({
            credential: admin.credential.cert(JSON.parse(fs.readFileSync('/tmp/sa.json', 'utf8'))),
            projectId: 'chincha-eeed6',
          });
          const src = fs.readFileSync('firestore-chincha.rules', 'utf8');
          admin.securityRules()
            .releaseFirestoreRulesetFromSource(src, 'chincha')
            .then((r) => { console.log('chincha rules deployed:', r.name); })
            .catch((e) => { console.error('chincha rules error:', e.message); process.exit(1); });
          EOF
