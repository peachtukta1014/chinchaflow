# ตรวจสอบ PR อัตโนมัติ — รัน smoke test + build ตามแอปที่ถูกแก้
# แล้ว comment ผลกลับเข้า PR ก่อน merge (ใช้กับ PR ที่ AI เปิดให้ และ PR ที่คนแก้มือ)
name: PR Verify

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      shrimp: ${{ steps.filter.outputs.shrimp }}
      tea: ${{ steps.filter.outputs.tea }}
      webhook: ${{ steps.filter.outputs.webhook }}
      ai_chat: ${{ steps.filter.outputs.ai_chat }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shrimp:
              - 'apps/seafood-pos/**'
            tea:
              - 'apps/chincha-tea/**'
            webhook:
              - 'apps/webhook-core/**'
            ai_chat:
              - 'apps/ai-chat/**'
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'firebase.json'
              - '.firebaserc'

  verify_shrimp:
    name: Verify Shrimp POS (smoke + build)
    needs: changes
    if: needs.changes.outputs.shrimp == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      smoke_result: ${{ steps.smoke.outcome }}
      build_result: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests (seafood-pos)
        id: smoke
        run: node apps/seafood-pos/scripts/smoke-test.mjs

      - name: Build seafood-pos
        id: build
        if: always() && steps.smoke.outcome == 'success'
        run: npm run build --workspace=apps/seafood-pos
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:        ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID_SHRIMP }}

  verify_tea:
    name: Verify Chincha Tea (build)
    needs: changes
    if: needs.changes.outputs.tea == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      build_result: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build chincha-tea
        id: build
        run: npm run build --workspace=apps/chincha-tea
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:        ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID_TEA }}

  verify_webhook:
    name: Verify webhook-core (syntax check)
    needs: changes
    if: needs.changes.outputs.webhook == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      build_result: ${{ steps.syntax.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # webhook-core ไม่มี local server / smoke test — เช็คได้แค่ syntax ของไฟล์ที่เปลี่ยน
      - name: Syntax check changed JS files
        id: syntax
        run: |
          set -euo pipefail
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'apps/webhook-core/**/*.js' || true)
          if [ -z "$changed" ]; then
            echo "ไม่มีไฟล์ .js เปลี่ยนใน webhook-core — skip"
            exit 0
          fi
          status=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            echo "checking $f"
            node --check "$f" || status=1
          done <<< "$changed"
          exit $status

  verify_ai_chat:
    name: Verify AI Chat (build)
    needs: changes
    if: needs.changes.outputs.ai_chat == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      build_result: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build ai-chat
        id: build
        run: npm run build --workspace=apps/ai-chat
        env:
          VITE_AI_CHAT_FUNCTION_URL: https://asia-southeast1-chincha-eeed6.cloudfunctions.net/aiChatAgentHttp

  comment:
    name: Comment verify results on PR
    needs: [changes, verify_shrimp, verify_tea, verify_webhook, verify_ai_chat]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build comment body
        id: body
        run: |
          {
            echo "body<<PRBODY_EOF"
            echo "### 🤖 PR Verify"
            echo ""

            if [ "${{ needs.changes.outputs.shrimp }}" == "true" ] || [ "${{ needs.changes.outputs.shared }}" == "true" ]; then
              smoke="${{ needs.verify_shrimp.outputs.smoke_result }}"
              build="${{ needs.verify_shrimp.outputs.build_result }}"
              if [ "$smoke" == "success" ] && [ "$build" == "success" ]; then
                echo "- 🦐 **seafood-pos**: ✅ smoke test ผ่าน, build ผ่าน"
              else
                echo "- 🦐 **seafood-pos**: ❌ smoke=$smoke build=$build — **ห้าม merge จนกว่าจะแก้**"
              fi
            fi

            if [ "${{ needs.changes.outputs.tea }}" == "true" ] || [ "${{ needs.changes.outputs.shared }}" == "true" ]; then
              build="${{ needs.verify_tea.outputs.build_result }}"
              if [ "$build" == "success" ]; then
                echo "- 🧋 **chincha-tea**: ✅ build ผ่าน"
              else
                echo "- 🧋 **chincha-tea**: ❌ build=$build — **ห้าม merge จนกว่าจะแก้**"
              fi
            fi

            if [ "${{ needs.changes.outputs.webhook }}" == "true" ] || [ "${{ needs.changes.outputs.shared }}" == "true" ]; then
              build="${{ needs.verify_webhook.outputs.build_result }}"
              if [ "$build" == "success" ]; then
                echo "- 🤖 **webhook-core**: ✅ syntax check ผ่าน"
              else
                echo "- 🤖 **webhook-core**: ❌ syntax check=$build — **ห้าม merge จนกว่าจะแก้**"
              fi
            fi

            if [ "${{ needs.changes.outputs.ai_chat }}" == "true" ] || [ "${{ needs.changes.outputs.shared }}" == "true" ]; then
              build="${{ needs.verify_ai_chat.outputs.build_result }}"
              if [ "$build" == "success" ]; then
                echo "- 💬 **ai-chat**: ✅ build ผ่าน"
              else
                echo "- 💬 **ai-chat**: ❌ build=$build — **ห้าม merge จนกว่าจะแก้**"
              fi
            fi

            echo ""
            echo "_ดูรายละเอียด log ที่แท็บ Checks ของ PR นี้_"
            echo "PRBODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.body.outputs.body }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

