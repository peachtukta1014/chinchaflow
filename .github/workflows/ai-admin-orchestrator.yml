name: AI Admin Orchestrator

on:
  workflow_dispatch:
    inputs:
      ai_instruction:
        description: 'คำสั่งถึง AI Admin:'
        required: true
        default: ''

# สำคัญมาก! อนุญาตให้ระบบเขียนไฟล์และ Push โค้ดได้
permissions:
  contents: write

jobs:
  run-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Orchestrator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_CODE_INSTRUCTION: ${{ github.event.inputs.ai_instruction }}
        run: node index.js